services:
  - type: web
    name: domain-stats-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: domain-stats-db
          property: connectionString
  
databases:
  - name: domain-stats-db
    plan: free
    region: oregon # O la más cercana a ti
